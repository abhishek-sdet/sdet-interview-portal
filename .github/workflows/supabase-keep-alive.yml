name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at midnight
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Keep-Alive Script (Node.js)
        env:
          URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/keep-alive.js
